name: Android Build
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf autogen libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev openjdk-17-jdk

      - name: Install Pip Dependencies
        run: |
          pip install --upgrade pip
          pip install "Cython<3.0" buildozer

      - name: Build APK
        run: |
          if [ ! -f buildozer.spec ]; then
            buildozer init
            sed -i 's/requirements = python3,kivy/requirements = python3,kivy,libffi/' buildozer.spec
            sed -i 's/source.include_exts = py,png,jpg,kv,atlas/source.include_exts = py,png,jpg,kv,atlas,json/' buildozer.spec
            sed -i 's/#android.accept_sdk_license = False/android.accept_sdk_license = True/' buildozer.spec
          fi
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KundenApp-Paket
          path: bin/*.apk
