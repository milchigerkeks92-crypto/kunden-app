name: Android Build
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build with Buildozer Action
        uses: ArtemShatalov/buildozer-action@v1.6.1
        with:
          python_version: '3.10'
          buildozer_version: 'stable'
          # Das Skript erstellt die spec automatisch, falls sie fehlt
          command: |
            if [ ! -f buildozer.spec ]; then
              buildozer init
              sed -i 's/requirements = python3,kivy/requirements = python3,kivy,libffi/' buildozer.spec
              sed -i 's/source.include_exts = py,png,jpg,kv,atlas/source.include_exts = py,png,jpg,kv,atlas,json/' buildozer.spec
            fi
            buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KundenApp-Installationsdatei
          path: bin/*.apk
