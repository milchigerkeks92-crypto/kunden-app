name: Build APK
on: [push, pull_request]

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build with Buildozer
        uses: ArtemShatalov/buildozer-action@v1
        with:
          buildozer_version: stable
          python_version: 3.10
          command: |
            # Erstelle spec falls nicht da
            if [ ! -f buildozer.spec ]; then
              buildozer init
              sed -i 's/requirements = python3,kivy/requirements = python3,kivy,libffi/' buildozer.spec
              sed -i 's/source.include_exts = py,png,jpg,kv,atlas/source.include_exts = py,png,jpg,kv,atlas,json/' buildozer.spec
              sed -i 's/#android.accept_sdk_license = False/android.accept_sdk_license = True/' buildozer.spec
            fi
            buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MeineApp
          path: bin/*.apk
